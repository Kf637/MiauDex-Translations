name: Validate Translations

on:
  pull_request:
    paths:
      - 'locales/*.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate translations
        id: validate
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            SCOPE="all locale files (PR targets main)"
            mapfile -t FILES < <(ls locales/*.json 2>/dev/null | grep -v "locales/en.json")
          else
            SCOPE="changed files only"
            mapfile -t FILES < <(
              git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'locales/*.json' \
              | grep -v "en.json" || true
            )
          fi

          echo "Scope: ${SCOPE}"
          echo ""

          FAILED=false

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No locale files to validate."
          else
            for file in "${FILES[@]}"; do
              [[ -z "$file" ]] && continue

              echo "=== ${file} ==="

              JSON_OUT=$(node tools/validate.js "$file" 2>&1)
              JSON_EXIT=$?

              if [[ $JSON_EXIT -ne 0 ]]; then
                echo "FAIL: Invalid JSON - fix this first, other checks skipped"
                echo "$JSON_OUT"
                echo ""
                FAILED=true
                continue
              fi
              echo "PASS: Valid JSON"

              MISSING_OUT=$(node tools/missing-keys.js "$file" 2>&1)
              MISSING_EXIT=$?

              if [[ $MISSING_EXIT -ne 0 ]]; then
                echo "FAIL: Key issues detected"
                FAILED=true
              else
                echo "PASS: All keys present"
              fi
              echo "$MISSING_OUT"

              PH_OUT=$(node tools/validate-placeholders.js "$file" 2>&1)
              PH_EXIT=$?

              if [[ $PH_EXIT -ne 0 ]]; then
                echo "FAIL: Placeholder issues - variables added or removed"
                echo "$PH_OUT"
                FAILED=true
              else
                echo "PASS: All placeholders preserved!"
              fi

              echo ""
            done
          fi

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Fail on validation errors
        if: steps.validate.outputs.failed == 'true'
        run: exit 1