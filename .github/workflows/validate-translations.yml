name: Validate Translations

on:
  pull_request:
    paths:
      - 'locales/*.json'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate translations
        id: validate
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            SCOPE="all locale files (PR targets main)"
            mapfile -t FILES < <(ls locales/*.json 2>/dev/null | grep -v "locales/en.json")
          else
            SCOPE="changed files only"
            mapfile -t FILES < <(
              git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'locales/*.json' \
              | grep -v "en.json" || true
            )
          fi

          REPORT="validation-report.md"
          FAILED=false

          echo "## __STATUS__ Translation Validation" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Scope: ${SCOPE}" >> "$REPORT"
          echo "" >> "$REPORT"

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No locale files to validate." >> "$REPORT"
          else
            for file in "${FILES[@]}"; do
              [[ -z "$file" ]] && continue

              echo "### ${file}" >> "$REPORT"
              echo "" >> "$REPORT"

              JSON_OUT=$(node tools/validate.js "$file" 2>&1)
              JSON_EXIT=$?

              if [[ $JSON_EXIT -ne 0 ]]; then
                echo "FAIL: Invalid JSON - fix this first, other checks skipped" >> "$REPORT"
                echo '```' >> "$REPORT"
                echo "$JSON_OUT" >> "$REPORT"
                echo '```' >> "$REPORT"
                echo "" >> "$REPORT"
                echo "---" >> "$REPORT"
                echo "" >> "$REPORT"
                FAILED=true
                continue
              fi
              echo "PASS: Valid JSON" >> "$REPORT"
              echo "" >> "$REPORT"

              MISSING_OUT=$(node tools/missing-keys.js "$file" 2>&1)
              MISSING_EXIT=$?

              if [[ $MISSING_EXIT -ne 0 ]]; then
                echo "FAIL: Key issues detected" >> "$REPORT"
                FAILED=true
              else
                echo "PASS: All keys present" >> "$REPORT"
              fi
              echo '```' >> "$REPORT"
              echo "$MISSING_OUT" >> "$REPORT"
              echo '```' >> "$REPORT"
              echo "" >> "$REPORT"

              PH_OUT=$(node tools/validate-placeholders.js "$file" 2>&1)
              PH_EXIT=$?

              if [[ $PH_EXIT -ne 0 ]]; then
                echo "FAIL: Placeholder issues - variables added or removed" >> "$REPORT"
                FAILED=true
                echo '```' >> "$REPORT"
                echo "$PH_OUT" >> "$REPORT"
                echo '```' >> "$REPORT"
              else
                echo "PASS: All placeholders preserved" >> "$REPORT"
              fi

              echo "" >> "$REPORT"
              echo "---" >> "$REPORT"
              echo "" >> "$REPORT"
            done
          fi

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const failed = '${{ steps.validate.outputs.failed }}' === 'true';

            let body = fs.readFileSync('validation-report.md', 'utf8');
            body = body.replace('__STATUS__', failed ? 'FAILED' : 'PASSED');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Translation Validation')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on validation errors
        if: steps.validate.outputs.failed == 'true'
        run: exit 1